<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojitek AI</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white;}
#messages{padding:15px;height:80vh;overflow:auto;}
.user{text-align:right;margin:10px;}
.ai{text-align:left;margin:10px;}
.input{position:fixed;bottom:0;width:100%;display:flex;padding:10px;background:#111;}
input{flex:1;padding:10px;border-radius:20px;border:none;}
button{margin-left:10px;background:#2563eb;color:white;border:none;border-radius:50%;padding:10px;}
</style>

</head>

<body>

<h2 style="padding:10px;">🤖 Lojitek AI</h2>

<div id="messages"></div>

<div class="input">
  <input id="msg" placeholder="Mande Lojitek AI..." />
  <button onclick="send()">➤</button>
</div>

<script>
async function send(){
  const msg = document.getElementById("msg").value;
  const box = document.getElementById("messages");

  box.innerHTML += `<div class="user">${msg}</div>`;

  const res = await fetch("/api/chat", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ message: msg })
  });

  const data = await res.json();

  box.innerHTML += `<div class="ai">${data.reply}</div>`;
  document.getElementById("msg").value="";
}
</script>

</body>
</html>
