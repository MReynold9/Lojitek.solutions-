<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojitek AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* MOBILE HEADER */
.topbar {
  display:none;
  background:#0f172a;
  padding:10px;
  text-align:center;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  background:#0f172a;
  padding:15px;
  height:100vh;
  position:fixed;
}

.sidebar h2 {
  color:#3b82f6;
}

.chat-item {
  padding:10px;
  margin-top:10px;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.main {
  margin-left:250px;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* CHAT */
#chat {
  flex:1;
  padding:15px;
  overflow:auto;
}

/* INPUT */
.input-area {
  display:flex;
  padding:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:5px;
  border:none;
}

button {
  padding:10px;
  margin-left:10px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:5px;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){
  .sidebar {
    display:none;
  }
  .main {
    margin-left:0;
  }
  .topbar {
    display:block;
  }
}
</style>
</head>

<body>

<!-- MOBILE HEADER -->
<div class="topbar">🤖 Lojitek AI</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🤖 Lojitek AI</h2>

  <div class="chat-item" onclick="quick('Nouvo chat')">Nouvo chat</div>
  <div class="chat-item" onclick="quick('Banm ide biznis')">Ide biznis</div>
  <div class="chat-item" onclick="quick('Banm konsèy maketing')">Maketing</div>
</div>

<!-- MAIN -->
<div class="main">

<div id="chat"></div>

<div class="input-area">
  <input id="msg" placeholder="Ekri mesaj..." />
  <button onclick="send()">Voye</button>
</div>

</div>

<script>
function quick(text){
  document.getElementById("msg").value = text;
  send();
}

async function send() {
  const msg = document.getElementById("msg").value;
  const chat = document.getElementById("chat");

  chat.innerHTML += `<p><b>Ou:</b> ${msg}</p>`;

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer YOUR_API_KEY",
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: [
        { role: "system", content: "Ou se Lojitek AI, ede biznis grandi ak maketing." },
        { role: "user", content: msg }
      ]
    })
  });

  const data = await res.json();

  chat.innerHTML += `<p><b>AI:</b> ${data.choices[0].message.content}</p>`;
  document.getElementById("msg").value="";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
