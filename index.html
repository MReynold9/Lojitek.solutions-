<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lojitek AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:250px;
  background:#111827;
  padding:15px;
  height:100vh;
}

.sidebar h3{
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:5px 0;
  background:#2563eb;
  border:none;
  color:white;
  border-radius:10px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header{
  padding:15px;
  border-bottom:1px solid #222;
}

/* CONTENT */
.content{
  flex:1;
  padding:20px;
  overflow-y:auto;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:10px;
}

/* CHAT */
.chat{
  padding:10px;
  border-top:1px solid #222;
  display:flex;
}

input{
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
}

button.send{
  margin-left:10px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:50%;
  padding:12px;
}

/* MOBILE */
@media(max-width:768px){
  .sidebar{
    display:none;
  }

  .cards{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🤖 Lojitek AI</h3>
  <button onclick="newChat()">Nouvo chat</button>
  <button onclick="quick('ide biznis')">Ide biznis</button>
  <button onclick="quick('maketing')">Maketing</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    Bonjour Reynold 👋
  </div>

  <div class="content" id="messages">

    <h2>Par où commencer ?</h2>

    <div class="cards">
      <div class="card" onclick="quick('kreye imaj')">🖼️ Kreye imaj</div>
      <div class="card" onclick="quick('mizik')">🎸 Kreye mizik</div>
      <div class="card" onclick="quick('ekri')">📄 Ekri tèks</div>
      <div class="card" onclick="quick('motivasyon')">✨ Motivasyon</div>
    </div>

  </div>

  <div class="chat">
    <input id="input" placeholder="Mande Lojitek AI...">
    <button class="send" onclick="send()">➤</button>
  </div>

</div>

<script>
function send(){
  let input = document.getElementById("input");
  let msg = input.value;

  if(msg==="") return;

  let div = document.createElement("div");
  div.innerHTML = "<p style='text-align:right;'>"+msg+"</p>";
  document.getElementById("messages").appendChild(div);

  input.value="";

  setTimeout(()=>{
    let ai = document.createElement("div");
    ai.innerHTML = "<p style='color:#60a5fa;'>🤖 Lojitek AI: Mwen ap reponn ou...</p>";
    document.getElementById("messages").appendChild(ai);
  },500);
}

function quick(text){
  document.getElementById("input").value = text;
  send();
}

function newChat(){
  document.getElementById("messages").innerHTML="";
}
</script>

</body>
</html>
